version: "2"
sql:
    - engine: "postgresql"
      queries:
          - "queries/jobs.sql"
          - "queries/events.sql"
      schema:
          - "migrations/202603100001_init.sql"
          - "migrations/202603100002_hardening.sql"
      gen:
          go:
              package: "dbgen"
              out: "dbgen"
              sql_package: "pgx/v5"
              emit_json_tags: true
              emit_interface: true
              emit_empty_slices: true
              emit_pointers_for_null_types: true
              overrides:
                  - db_type: "uuid"
                    go_type: "github.com/google/uuid.UUID"
